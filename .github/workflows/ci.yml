name: smoke

# Fast sanity check that the deposited code + data form a runnable bundle:
# paths resolve, core library imports, closed-form linear algebra is
# self-consistent, the validity-screen constants and epsilon=1 coverage
# threshold behave as documented, and a deposited result regenerates from its
# deposited input. Does not run the heavy sweeps or MATLAB figure scripts.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.12']
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: Run smoke tests
        env:
          MSM_ROOT: ${{ github.workspace }}
        run: python -m pytest tests/ -q
